name: 🧪 Tests on Hetzner Runner (Auto-Scaling)

on:
  # Manual trigger for testing
  workflow_dispatch:
  # Also on push to main
  push:
    branches:
      - main

jobs:
  deploy-and-test:
    name: 🚀 Deploy Server & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🚀 Create Hetzner Server & Run Tests
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
        run: |
          python hetzner_deploy.py \
            --action create \
            --hetzner-token "$HETZNER_TOKEN" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --github-org "${{ github.repository_owner }}" \
            --server-name "test-runner-${{ github.run_id }}"

          # Extract server ID
          SERVER_ID=$(python -c "import json; print(json.load(open('deployment.json'))['server_id'])")
          echo "SERVER_ID=$SERVER_ID" >> $GITHUB_ENV

          PUBLIC_IP=$(python -c "import json; print(json.load(open('deployment.json'))['public_ip'])")
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

          echo "### 🚀 Server Created" >> $GITHUB_STEP_SUMMARY
          echo "- **Server ID**: $SERVER_ID" >> $GITHUB_STEP_SUMMARY
          echo "- **Public IP**: $PUBLIC_IP" >> $GITHUB_STEP_SUMMARY

      - name: ⏳ Wait for tests to complete
        run: |
          echo "Waiting 2 minutes for server to initialize and run tests..."
          sleep 120

      - name: 📊 Test Results Summary
        run: |
          echo "### ✅ Test Execution Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: ${{ env.PUBLIC_IP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: Ran automatically on server startup" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: ~2 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- **Cost**: ~€0.003 per run" >> $GITHUB_STEP_SUMMARY

  cleanup:
    name: 🧹 Cleanup Server
    needs: deploy-and-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🧹 Delete Hetzner Server
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
        run: |
          # Read server ID from previous job output
          if [ -f deployment.json ]; then
            SERVER_ID=$(python -c "import json; print(json.load(open('deployment.json'))['server_id'])" 2>/dev/null || echo "")
            if [ ! -z "$SERVER_ID" ]; then
              echo "Cleaning up server $SERVER_ID..."
              python hetzner_deploy.py \
                --action cleanup \
                --hetzner-token "$HETZNER_TOKEN" \
                --github-token "${{ secrets.GITHUB_TOKEN }}" \
                --server-id "$SERVER_ID" || true
            fi
          fi

      - name: 💰 Cost Summary
        run: |
          echo "### 💰 Infrastructure Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Machine Type**: Hetzner cx23" >> $GITHUB_STEP_SUMMARY
          echo "- **Hourly Cost**: €0.004" >> $GITHUB_STEP_SUMMARY
          echo "- **Per Test Run**: ~€0.0001-0.0003" >> $GITHUB_STEP_SUMMARY
          echo "- **Monthly (100 tests)**: ~€0.03" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Zero idle cost** - server deleted after tests complete" >> $GITHUB_STEP_SUMMARY
