name: 🧪 Tests on Hetzner Runner (Auto-Scaling)

on:
  # Manual trigger for testing
  workflow_dispatch:
  # Also on push to main
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - '**.py'

jobs:
  deploy-runner:
    name: 🚀 Deploy Hetzner Server
    runs-on: ubuntu-latest
    outputs:
      server-id: ${{ steps.deploy.outputs.server-id }}
      public-ip: ${{ steps.deploy.outputs.public-ip }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🚀 Create Hetzner Server
        id: deploy
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
        run: |
          python hetzner_deploy.py \
            --action create \
            --hetzner-token "$HETZNER_TOKEN" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --github-org "${{ github.repository_owner }}" \
            --server-name "gh-runner-${{ github.run_id }}"

          # Extract server ID from deployment.json
          SERVER_ID=$(python -c "import json; print(json.load(open('deployment.json'))['server_id'])")
          echo "server-id=$SERVER_ID" >> $GITHUB_OUTPUT

          PUBLIC_IP=$(python -c "import json; print(json.load(open('deployment.json'))['public_ip'])")
          echo "public-ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: ⏳ Wait for runner to be ready
        run: sleep 60  # Wait 60 seconds for GitHub runner to initialize

      - name: 📊 Deployment Summary
        run: |
          echo "### Hetzner Server Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server ID**: ${{ steps.deploy.outputs.server-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Public IP**: ${{ steps.deploy.outputs.public-ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cost**: €0.004 per hour (~€0.10 per month if running tests 24/7)" >> $GITHUB_STEP_SUMMARY

  run-tests:
    name: 🧪 Run Tests
    needs: deploy-runner
    runs-on: [ self-hosted, linux ]  # Use self-hosted runner on Hetzner

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: 🧪 Run tests
        run: |
          python -m pytest tests/ -v --cov=self_improvement --cov-report=xml
        continue-on-error: true

      - name: 📊 Test Summary
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed on Hetzner self-hosted runner" >> $GITHUB_STEP_SUMMARY
          echo "Server ID: ${{ needs.deploy-runner.outputs.server-id }}" >> $GITHUB_STEP_SUMMARY

  cleanup:
    name: 🧹 Cleanup Server
    needs: [ deploy-runner, run-tests ]
    runs-on: ubuntu-latest
    if: always()  # Always cleanup, even if tests fail

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🧹 Delete Hetzner Server
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
        run: |
          python hetzner_deploy.py \
            --action cleanup \
            --hetzner-token "$HETZNER_TOKEN" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --server-id ${{ needs.deploy-runner.outputs.server-id }}

      - name: 💰 Cost Summary
        run: |
          echo "### Infrastructure Costs" >> $GITHUB_STEP_SUMMARY
          echo "- **Machine**: Hetzner CX11 (€2.99/month)" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Duration**: ~2-5 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- **Cost per Run**: €0.005-0.015" >> $GITHUB_STEP_SUMMARY
          echo "- **Monthly Cost**: ~€0.15-0.45 (if tests run daily)" >> $GITHUB_STEP_SUMMARY
