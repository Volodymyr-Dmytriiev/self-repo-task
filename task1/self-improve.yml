name: 🤖 Self-Improvement Agent

on:
  # Run every 2 hours
  schedule:
    - cron: '0 */2 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

  # Also run on push to main (optional)
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'README.md'

jobs:
  self-improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: 🔐 Configure Git
        run: |
          git config user.name "Self-Improvement Agent"
          git config user.email "agent@self-improvement.local"

      - name: 🤖 Run Self-Improvement Agent
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python self-improve.py \
            --api-key "$CLAUDE_API_KEY" \
            --github-token "$GITHUB_TOKEN" \
            --repo-path . \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name "${{ github.event.repository.name }}"

      - name: 📊 Log Summary
        if: always()
        run: |
          echo "### Self-Improvement Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
